# Compila Haxe → JS, sincroniza Capacitor y genera AAB en Ubuntu (sin Android Studio).
# Artefacto: app-release.aab (con secretos) o app-debug.aab (sin keystore).

name: Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Haxelib (Heaps)
        run: |
          mkdir -p ~/haxelib
          haxelib setup ~/haxelib
          haxelib install heaps

      - uses: android-actions/setup-android@v3

      - name: Aceptar licencias SDK
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - run: npm ci

      - name: Compilar Haxe
        run: haxe build.hxml

      - name: Empaquetar www para Capacitor
        run: bash scripts/sync-www-for-android.sh

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decodificar keystore (solo si hay secretos)
        id: signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/upload.keystore"
          chmod 600 "${RUNNER_TEMP}/upload.keystore"
          {
            echo "ANDROID_KEYSTORE_FILE=${RUNNER_TEMP}/upload.keystore"
            echo "ANDROID_KEYSTORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}"
            echo "ANDROID_KEY_ALIAS=${ANDROID_KEY_ALIAS}"
            echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}"
          } >> "$GITHUB_ENV"

      - name: Gradle bundleRelease (firmado para Play)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          GRADLE_OPTS: -Xmx3g
        run: chmod +x gradlew && ./gradlew --no-daemon bundleRelease

      - name: Gradle bundleDebug (pruebas sin keystore en GitHub)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        working-directory: android
        env:
          GRADLE_OPTS: -Xmx3g
        run: chmod +x gradlew && ./gradlew --no-daemon bundleDebug

      - name: Subir AAB release
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: soul-bloops-release
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Subir AAB debug
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: soul-bloops-debug
          path: android/app/build/outputs/bundle/debug/*.aab
          if-no-files-found: error
